<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Neon Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00;
            margin-bottom: 10px;
            font-size: 32px;
            text-transform: uppercase;
        }
        .arcade-cabinet {
            background: #050505;
            padding: 25px 25px 40px 25px;
            border-radius: 20px;
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.3), 
                        inset 0 0 30px rgba(0, 0, 0, 0.9);
            position: relative;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #fff;
            width: 448px; /* Based on 28 tiles * 16px */
        }
        .ui-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .label { font-size: 10px; color: #00ccff; text-shadow: 0 0 5px #00ccff; }
        .score-val { color: #fff; }
        
        .canvas-container {
            position: relative;
        }
        canvas {
            display: block;
            background-color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            /* Scale canvas in CSS for better visibility on larger screens, internal is 448x496 */
            width: 448px; 
            height: 496px;
            image-rendering: pixelated;
        }
        
        #message-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            z-index: 10;
        }
        .msg-title {
            color: #ff0055; font-size: 28px; margin-bottom: 20px;
            text-shadow: 3px 3px 0px #fff;
        }
        .msg-text { color: #ffcc00; font-size: 12px; line-height: 2; text-align: center; margin-bottom: 20px; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        
        .controls-hint {
            margin-top: 20px;
            font-size: 10px;
            color: #888;
            text-align: center;
            font-family: sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>PAC-MAN</h1>

    <div class="arcade-cabinet">
        <div id="ui">
            <div class="ui-item">
                <span class="label">SCORE</span>
                <span id="score" class="score-val">0</span>
            </div>
            <div class="ui-item">
                <span class="label">LEVEL</span>
                <span id="level" class="score-val" style="color: #ffcc00;">1</span>
            </div>
            <div class="ui-item">
                <span class="label">LIVES</span>
                <span id="lives" class="score-val" style="color: #ff0055;">♥♥♥</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="message-overlay">
                <div id="msg-title" class="msg-title">READY!</div>
                <div id="msg-text" class="msg-text">
                    Use as setas do teclado<br>para se mover.
                </div>
                <div class="msg-text blink" style="color:#fff; font-size:10px;">PRESSIONE ESPAÇO PARA INICIAR</div>
            </div>
        </div>
    </div>
    
    <div class="controls-hint">DESIGN RESPONSIVO | SETAS PARA MOVIMENTO | DESENVOLVIDO EM ARQUIVO ÚNICO</div>

<script>
/**
 * PAC-MAN ARCADE ENGINE
 * Zero dependências, Vanilla JS e Canvas HTML5.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('message-overlay');
const msgTitle = document.getElementById('msg-title');
const msgText = document.getElementById('msg-text');

// Resolução interna do jogo
const TILE_SIZE = 16;
canvas.width = 28 * TILE_SIZE;  // 448px
canvas.height = 31 * TILE_SIZE; // 496px

// Variáveis de Estado Globais do Jogo
let score = 0;
let level = 1;
let lives = 3;
let gameState = 'START'; // START, PLAYING, GAMEOVER, LEVEL_TRANSITION
let dotsCount = 0;
let frames = 0;
let scaredTimer = 0;
let scaredMultiplier = 1;

// O Mapa (W = Parede, . = Pastilha, * = Power Pellet, Espaço = Vazio/Caminho, - = Portão)
const mapDesign = [
    "WWWWWWWWWWWWWWWWWWWWWWWWWWWW",
    "W............WW............W",
    "W.WWWW.WWWWW.WW.WWWWW.WWWW.W",
    "W*WWWW.WWWWW.WW.WWWWW.WWWW*W",
    "W.WWWW.WWWWW.WW.WWWWW.WWWW.W",
    "W..........................W",
    "W.WWWW.WW.WWWWWWWW.WW.WWWW.W",
    "W.WWWW.WW.WWWWWWWW.WW.WWWW.W",
    "W......WW....WW....WW......W",
    "WWWWWW.WWWWW    WWWWW.WWWWWW",
    "      .WWWWW    WWWWW.      ",
    "      .WW          WW.      ",
    "      .WW WWW--WWW WW.      ",
    "WWWWWW.WW W      W WW.WWWWWW",
    "      .   W      W   .      ",
    "WWWWWW.WW W      W WW.WWWWWW",
    "      .WW WWWWWWWW WW.      ",
    "      .WW          WW.      ",
    "      .WW WWWWWWWW WW.      ",
    "WWWWWW.WW WWWWWWWW WW.WWWWWW",
    "W............WW............W",
    "W.WWWW.WWWWW.WW.WWWWW.WWWW.W",
    "W*..WW................WW..*W",
    "WWW.WW.WW.WWWWWWWW.WW.WW.WWW",
    "WWW.WW.WW.WWWWWWWW.WW.WW.WWW",
    "W......WW....WW....WW......W",
    "W.WWWWWWWWWW.WW.WWWWWWWWWW.W",
    "W.WWWWWWWWWW.WW.WWWWWWWWWW.W",
    "W..........................W",
    "WWWWWWWWWWWWWWWWWWWWWWWWWWWW",
    "                            "
];

// Conversão do Mapa de Letras para IDs (0: Caminho, 1: Dot, 2: PPellet, 3: Parede, 4: Portão)
let grid = [];
function parseMap() {
    grid = [];
    dotsCount = 0;
    for (let r = 0; r < mapDesign.length; r++) {
        let row = [];
        for (let c = 0; c < mapDesign[r].length; c++) {
            let char = mapDesign[r][c];
            if (char === '.') { row.push(1); dotsCount++; }
            else if (char === '*') { row.push(2); dotsCount++; }
            else if (char === 'W') row.push(3);
            else if (char === '-') row.push(4);
            else row.push(0);
        }
        grid.push(row);
    }
}

// Utilitário de Direções
const DIR = {
    UP: {x: 0, y: -1, code: 'up'},
    DOWN: {x: 0, y: 1, code: 'down'},
    LEFT: {x: -1, y: 0, code: 'left'},
    RIGHT: {x: 1, y: 0, code: 'right'},
    NONE: {x: 0, y: 0, code: 'none'}
};

// Funções de Colisão do Grid
function isWall(col, row, isGhost = false) {
    if (col < 0 || col >= 28) return false; // Permite túnel lateral
    if (row < 0 || row >= 31) return true;
    let tile = grid[row][col];
    if (tile === 3) return true;
    // Portão da casa assombra (Sempre fechado para Pac-Man, Mas atravessável por fantamas saindo)
    if (tile === 4 && !isGhost) return true; 
    return false;
}

// Helper para centralizar elementos no Tile
function getTileCenter(x, y) {
    return {
        tx: Math.floor(x / TILE_SIZE) * TILE_SIZE + TILE_SIZE/2,
        ty: Math.floor(y / TILE_SIZE) * TILE_SIZE + TILE_SIZE/2
    };
}

// Entidade Base
class Entity {
    constructor(startX, startY) {
        this.startX = startX * TILE_SIZE + TILE_SIZE/2;
        this.startY = startY * TILE_SIZE + TILE_SIZE/2;
        this.x = this.startX;
        this.y = this.startY;
        this.dir = DIR.NONE;
        this.speed = 2; // Pixel por Frame
        this.radius = 7;
    }
    
    reset() {
        this.x = this.startX;
        this.y = this.startY;
        this.dir = DIR.NONE;
    }

    getCol() { return Math.floor(this.x / TILE_SIZE); }
    getRow() { return Math.floor(this.y / TILE_SIZE); }
}

// --- JOGADOR: PAC-MAN ---
class Player extends Entity {
    constructor(x, y) {
        super(x, y);
        this.nextDir = DIR.NONE;
        this.mouthOpen = 0;
        this.mouthDir = 1;
    }

    update() {
        // Tolerância para curva suave (Pre-turn cornering)
        let margin = 5;
        let c = getTileCenter(this.x, this.y);
        let distCenter = Math.abs(this.x - c.tx) + Math.abs(this.y - c.ty);

        // Tentando mudar de direção!
        if (this.nextDir !== DIR.NONE && this.nextDir !== this.dir) {
            // Curva de 180 graus rola livremente
            if (this.dir !== DIR.NONE && this.nextDir.x === -this.dir.x && this.nextDir.y === -this.dir.y) {
                this.dir = this.nextDir;
                this.nextDir = DIR.NONE;
            } 
            // Verificando interseção (centro da tile) => Efetua curva perfeita ("Block Collider")
            else if (distCenter <= margin || this.dir === DIR.NONE) {
                let targetCol = Math.floor(c.tx / TILE_SIZE) + this.nextDir.x;
                let targetRow = Math.floor(c.ty / TILE_SIZE) + this.nextDir.y;
                
                if (!isWall(targetCol, targetRow, false)) {
                    // Prender perfeitamente no eixo
                    this.x = c.tx;
                    this.y = c.ty;
                    this.dir = this.nextDir;
                    this.nextDir = DIR.NONE;
                }
            }
        }

        // Movimento Contínuo & Colisão Normal com Paredes Frontais
        if (this.dir !== DIR.NONE) {
            let nx = this.x + this.dir.x * this.speed;
            let ny = this.y + this.dir.y * this.speed;
            
            // Qual Tile a ponta do Pacman está tocando?
            let leadCol = Math.floor((nx + this.dir.x * this.radius) / TILE_SIZE);
            let leadRow = Math.floor((ny + this.dir.y * this.radius) / TILE_SIZE);

            if (!isWall(leadCol, leadRow, false)) {
                this.x = nx;
                this.y = ny;
            } else {
                // Prender no centro do tile quando bate
                this.x = c.tx;
                this.y = c.ty;
            }
        }

        // Túnel Infinito horizontal (Warp)
        if (this.x < -TILE_SIZE/2) this.x = canvas.width + TILE_SIZE/2;
        if (this.x > canvas.width + TILE_SIZE/2) this.x = -TILE_SIZE/2;

        // Comendo Itens
        let row = this.getRow();
        let col = this.getCol();
        if (row >= 0 && row < grid.length && col >= 0 && col < grid[0].length) {
            if (grid[row][col] === 1) { // Normal Dot
                grid[row][col] = 0;
                addScore(10);
                dotsCount--;
                checkLevelComplete();
            } else if (grid[row][col] === 2) { // Power Pellet
                grid[row][col] = 0;
                addScore(50);
                dotsCount--;
                triggerFrightenedMode();
                checkLevelComplete();
            }
        }

        // Animação da Boca
        if (this.dir !== DIR.NONE) {
            this.mouthOpen += 0.15 * this.mouthDir;
            if (this.mouthOpen >= 0.4 || this.mouthOpen <= 0) {
                this.mouthDir *= -1;
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        let rotation = 0;
        if (this.dir.code === 'down') rotation = Math.PI / 2;
        if (this.dir.code === 'left') rotation = Math.PI;
        if (this.dir.code === 'up') rotation = -Math.PI / 2;
        ctx.rotate(rotation);

        ctx.fillStyle = '#FFFF00'; // Amarelo Clássico
        ctx.beginPath();
        let mouthAngle = this.mouthOpen * Math.PI;
        ctx.arc(0, 0, this.radius+1, mouthAngle, Math.PI * 2 - mouthAngle);
        ctx.lineTo(0, 0);
        ctx.fill();
        ctx.restore();
    }
}

// --- INIMIGOS: FANTASMAS ---
class Ghost extends Entity {
    constructor(x, y, color, type) {
        super(x, y);
        this.color = color;
        this.type = type; // Blinky, Pinky, etc
        this.state = 'HOUSE'; // HOUSE, CHASE, SCATTER, FRIGHTENED, EATEN
        this.turnCooldown = 0;
        this.scatterTimer = 0;
    }

    update(target, frames) {
        this.turnCooldown--;
        
        // Ajuste de velocidade baseado no State
        if (this.state === 'FRIGHTENED') this.speed = 1;
        else if (this.state === 'EATEN') this.speed = 4;
        else this.speed = 2; // (Pode escalar com levels depois)
        
        // IA e Movimento no Grid
        let c = getTileCenter(this.x, this.y);
        let distCenter = Math.abs(this.x - c.tx) + Math.abs(this.y - c.ty);
        
        // Ao alcançar rigorosamente o centro de uma tile: Hora de decidir pra onde ir!
        if ((distCenter <= 2 || this.dir === DIR.NONE) && this.turnCooldown <= 0) {
            
            // Destino Alvo baseado no State e Tipo
            let targetCol = target.getCol();
            let targetRow = target.getRow();

            if (this.state === 'HOUSE') {
                targetRow = 11; // Sair da casa
                if (c.ty < 12*TILE_SIZE) this.state = 'CHASE'; // Saiu da casa!
            }
            else if (this.state === 'SCATTER' || this.state === 'FRIGHTENED') {
                // No susto/espalhado vai pra cantos aleatórios
                if(this.type === 'Blinky') { targetCol=26; targetRow=1; }
                if(this.type === 'Pinky') { targetCol=1; targetRow=1; }
                if(this.type === 'Inky') { targetCol=26; targetRow=29; }
                if(this.type === 'Clyde') { targetCol=1; targetRow=29; }
                
                // Se Assustado, movimenta totalmente random erradamente
                if (this.state === 'FRIGHTENED') {
                    targetCol = Math.floor(Math.random()*28);
                    targetRow = Math.floor(Math.random()*31);
                }
            }
            else if (this.state === 'EATEN') {
                targetCol = 14; targetRow = 14; // Voltar pra base
                if (this.getCol() === 14 && this.getRow() >= 13 && this.getRow() <= 15) {
                    this.state = 'HOUSE';
                }
            }
            else if (this.state === 'CHASE') {
                // Inteligência Artificial por tipo ("monstros correndo atrás" inteligentes)
                if (this.type === 'Blinky') {
                    // Direto ao ponto
                } else if (this.type === 'Pinky') {
                    // Tenta emboscar 4 tiles a frente
                    targetCol += target.dir.x * 4;
                    targetRow += target.dir.y * 4;
                } else if (this.type === 'Clyde') {
                    let distToPac = Math.sqrt(Math.pow(this.getCol()-targetCol,2) + Math.pow(this.getRow()-targetRow,2));
                    if (distToPac < 8) { // Longe? Persegue. Perto? Foge.
                        targetCol=1; targetRow=29; // Recua pro canto
                    }
                } // Inky se posiciona num meio termo.
            }

            // Descobrir quais as rotas disponíveis nos vizinhos (Evitando 180 degrees backwards)
            let validMoves = [];
            for (let d in DIR) {
                let dVec = DIR[d];
                if (dVec === DIR.NONE) continue;
                
                // Fantasmas não dão "Backtrack" natural
                if (dVec.x === -this.dir.x && dVec.y === -this.dir.y && this.dir !== DIR.NONE && this.state !== 'EATEN') {
                     continue; 
                }

                let nextC = Math.floor(c.tx / TILE_SIZE) + dVec.x;
                let nextR = Math.floor(c.ty / TILE_SIZE) + dVec.y;
                
                // Pode atravessar The Gate (Valor 4) apenas se for Eaten voltando pra casa ou House saindo
                let isInsideHouse = this.state === 'EATEN' || this.state === 'HOUSE';
                
                if (!isWall(nextC, nextR, isInsideHouse)) {
                    let dToTarget = Math.pow(nextC - targetCol, 2) + Math.pow(nextR - targetRow, 2);
                    validMoves.push({ dir: dVec, dist: dToTarget, col: nextC, row: nextR });
                }
            }

            // Seleciona o que encurta mais o caminho
            if (validMoves.length > 0) {
                // Sort pelo caminho mais curto
                validMoves.sort((a,b) => a.dist - b.dist);
                
                this.x = c.tx; // Snap para alinhar precisamento
                this.y = c.ty;
                this.dir = validMoves[0].dir;
                this.turnCooldown = 5; // Evita loop de cálculo na mesma tile
            }
        }
        
        // Movimentação em si calculada
        if (this.dir !== DIR.NONE) {
            this.x += this.dir.x * this.speed;
            this.y += this.dir.y * this.speed;
        }

        // Warp
        if (this.x < -TILE_SIZE/2) this.x = canvas.width + TILE_SIZE/2;
        if (this.x > canvas.width + TILE_SIZE/2) this.x = -TILE_SIZE/2;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        let drawColor = this.color;
        if (this.state === 'FRIGHTENED') {
            // Piscar se estiver perto de acabar o tempo do power up
            if (scaredTimer < 120 && Math.floor(frames / 10) % 2 === 0) {
                drawColor = '#FFFFFF';
            } else {
                drawColor = '#0033ff'; // Azulzão Assustado
            }
        }
        
        if (this.state === 'EATEN') {
            // Desenha com apenas os Olhos voando pra base
            ctx.fillStyle = '#fff';
            // Olho Esquerdo
            ctx.beginPath(); ctx.arc(-3, -2, 2, 0, Math.PI*2); ctx.fill();
            // Olho Direito
            ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI*2); ctx.fill();
            ctx.restore();
            return;
        }

        // Desenho clássico do corpo do Fantasma
        ctx.fillStyle = drawColor;
        ctx.beginPath();
        ctx.arc(0, -this.radius/2, this.radius+1, Math.PI, 0); // Cabeça Arredondada
        ctx.lineTo(this.radius+1, this.radius+2); // Lateral Dir
        
        // Ondinhas embaixo (Tentáculos)
        ctx.lineTo(this.radius/2, this.radius-1);
        ctx.lineTo(0, this.radius+2);
        ctx.lineTo(-this.radius/2, this.radius-1);
        
        ctx.lineTo(-this.radius-1, this.radius+2); // Lateral Esq
        ctx.lineTo(-this.radius-1, -this.radius/2);
        ctx.fill();

        // Olhos Brancos
        ctx.fillStyle = '#FFF'; 
        ctx.beginPath(); ctx.arc(-3, -2, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -2, 2.5, 0, Math.PI*2); ctx.fill();
        
        // Pupilas (Olham na direção do movimento)
        ctx.fillStyle = '#000';
        let px = this.dir.x * 1; let py = this.dir.y * 1;
        ctx.beginPath(); ctx.arc(-3 + px, -2 + py, 1, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(3 + px, -2 + py, 1, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
}


// Instanciando Personagens (No pixel base da matriz)
let pacman = new Player(13, 22);
let ghosts = [];

function initEntities() {
    pacman = new Player(13, 22); // Posição exata que não colide com parede (Row 22)
    ghosts = [
        new Ghost(13, 11, '#ff0000', 'Blinky'),  // Red, Fora da casinha
        new Ghost(14, 14, '#ffb8ff', 'Pinky'),  // Pink
        new Ghost(12, 14, '#00ffff', 'Inky'),   // Cyan
        new Ghost(15, 14, '#ffb852', 'Clyde')   // Orange
    ];
}


// --- MOTOR PRINCIPAL ---

function updateHUD() {
    scoreEl.innerText = score.toString();
    levelEl.innerText = level.toString();
    livesEl.innerText = '♥'.repeat(lives);
    if(lives <= 0) livesEl.innerText = 'DEAD';
}

function addScore(points) {
    score += points;
    updateHUD();
}

function triggerFrightenedMode() {
    // Níveis mais altos fazem o medo durar menos
    let baseTime = Math.max(120, 400 - (level * 30)); 
    scaredTimer = baseTime;
    scaredMultiplier = 1;
    ghosts.forEach(g => {
        if (g.state !== 'EATEN') g.state = 'FRIGHTENED';
    });
}

function checkCollisions() {
    let pRect = { x: pacman.x, y: pacman.y, r: 7 };
    
    ghosts.forEach(g => {
        let dist = Math.sqrt(Math.pow(pRect.x - g.x, 2) + Math.pow(pRect.y - g.y, 2));
        
        if (dist < 12) { // Tocou num Fantasma!
            if (g.state === 'FRIGHTENED') {
                // Comeu!
                g.state = 'EATEN';
                addScore(200 * scaredMultiplier);
                scaredMultiplier *= 2; // Combos de Pontuação (200, 400, 800, 1600)
            } 
            else if (g.state === 'CHASE' || g.state === 'SCATTER' || g.state === 'HOUSE') {
                // Morreu!
                looseLife();
            }
        }
    });
}

function looseLife() {
    gameState = 'DEAD_WAIT';
    lives--;
    updateHUD();
    
    setTimeout(() => {
        if (lives > 0) {
            initEntities();
            gameState = 'PLAYING';
        } else {
            gameOver();
        }
    }, 1500);
}

function gameOver() {
    gameState = 'GAMEOVER';
    overlay.style.display = 'flex';
    msgTitle.innerText = "GAME OVER";
    msgText.innerHTML = `SCORE: <strong style="color:#FFF; font-size:16px;">${score}</strong><br>PRESSIONE ESPAÇO PARA REINICIAR`;
}

function checkLevelComplete() {
    if (dotsCount <= 0) {
        gameState = 'LEVEL_TRANSITION';
        level++;
        setTimeout(() => {
            parseMap();
            initEntities();
            updateHUD();
            gameState = 'PLAYING';
        }, 2000); // 2 segundos respirando
    }
}

function drawMap() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < grid[r].length; c++) {
            let val = grid[r][c];
            let tx = c * TILE_SIZE;
            let ty = r * TILE_SIZE;
            
            if (val === 3) {
                // Paredes em Azul Neon Retrô!
                ctx.fillStyle = '#0909B8';
                ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                // Efeito do Meio da parede para parecer tubo Arcade
                ctx.fillStyle = '#000';
                ctx.fillRect(tx+2, ty+2, TILE_SIZE-4, TILE_SIZE-4);
            }
            if (val === 1) { // Dot normal
                ctx.fillStyle = '#FFCCCB';
                ctx.fillRect(tx + 6, ty + 6, 4, 4);
            }
            if (val === 2) { // Power Pellet animada pulsando
                ctx.fillStyle = '#FFCCCB';
                ctx.beginPath();
                ctx.arc(tx + 8, ty + 8, 5 + Math.sin(frames/10)*2, 0, Math.PI*2);
                ctx.fill();
            }
            if (val === 4) { // House Gate
                ctx.fillStyle = '#FFB8FF';
                ctx.fillRect(tx, ty + 6, TILE_SIZE, 4);
            }
        }
    }
}

function gameLoop() {
    requestAnimationFrame(gameLoop);
    frames++;

    if (gameState === 'PLAYING') {
        // Logica Principal
        pacman.update();
        checkCollisions();
        
        // Scared Timer Decay
        if (scaredTimer > 0) {
            scaredTimer--;
            if (scaredTimer <= 0) {
                // Transicionar fantasmas vivos de volta para perseguição
                ghosts.forEach(g => {
                    if (g.state === 'FRIGHTENED') g.state = 'CHASE';
                });
            }
        }

        // Toggles Scatter & Chase por onda (Complexidade Clássica)
        if (frames % 900 === 0 && scaredTimer <= 0) { // A cada 15 segundos muda state levemente pra espalhar
             ghosts.forEach(g => { if(g.state==='CHASE') g.state='SCATTER'; });
        }
        if (frames % 900 === 200 && scaredTimer <= 0) { // Volta a perseguir
             ghosts.forEach(g => { if(g.state==='SCATTER') g.state='CHASE'; });
        }

        ghosts.forEach(g => g.update(pacman, frames));
    }

    // Desenho na tela unificado (Sempre desenha o mapa a menos que seja piscada violenta de level up)
    drawMap();
    if (gameState === 'PLAYING' || gameState === 'DEAD_WAIT') {
        ghosts.forEach(g => g.draw());
        pacman.draw();
    }
}

// Iniciar Motor
function startGame() {
    score = 0; level = 1; lives = 3;
    parseMap();
    initEntities();
    updateHUD();
    gameState = 'PLAYING';
    overlay.style.display = 'none';
}

// Controladores do Teclado
window.addEventListener('keydown', (e) => {
    // Previne rolamento da tela
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].indexOf(e.code) > -1) {
        e.preventDefault();
    }

    if (gameState === 'START' || gameState === 'GAMEOVER') {
        if (e.code === 'Space') startGame();
        return;
    }

    if (gameState === 'PLAYING') {
        if (e.key === 'ArrowUp' || e.key === 'w') pacman.nextDir = DIR.UP;
        if (e.key === 'ArrowDown' || e.key === 's') pacman.nextDir = DIR.DOWN;
        if (e.key === 'ArrowLeft' || e.key === 'a') pacman.nextDir = DIR.LEFT;
        if (e.key === 'ArrowRight' || e.key === 'd') pacman.nextDir = DIR.RIGHT;
    }
});

// Setup Inicial Ponto 0
parseMap();
updateHUD(); // Setar initial View UI antes do Play
requestAnimationFrame(gameLoop);

</script>
